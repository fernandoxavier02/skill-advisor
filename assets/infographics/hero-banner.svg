<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" role="img" aria-labelledby="bannerTitle bannerDesc" preserveAspectRatio="xMidYMid meet">
  <title id="bannerTitle">Skill Advisor — one task, the right skills, never mixed</title>
  <desc id="bannerDesc">Premium hero banner with graph visualization representing the Obsidian vault and skill network that powers the advisor's routing</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0B0F1E"/>
      <stop offset="0.5" stop-color="#1E1B4B"/>
      <stop offset="1" stop-color="#312E81"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.72" cy="0.48" r="0.5">
      <stop offset="0" stop-color="#8B5CF6" stop-opacity="0.35"/>
      <stop offset="0.5" stop-color="#7C3AED" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#1E1B4B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="purple" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#F472B6"/>
      <stop offset="0.5" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <style>
      .eyebrow { font: 600 13px -apple-system, "Segoe UI", Roboto, sans-serif; fill: #A78BFA; letter-spacing: 0.24em; text-transform: uppercase; }
      .title   { font: 800 72px -apple-system, "Segoe UI", Roboto, sans-serif; fill: #F8FAFC; letter-spacing: -0.03em; }
      .tag     { font: 500 22px -apple-system, "Segoe UI", Roboto, sans-serif; fill: #CBD5E1; letter-spacing: -0.01em; }
      .chip    { font: 600 12px -apple-system, "Segoe UI", Roboto, sans-serif; fill: #E2E8F0; letter-spacing: 0.04em; }
      .ver     { font: 700 11px -apple-system, "Segoe UI", Roboto, sans-serif; fill: #A78BFA; letter-spacing: 0.18em; }
      .legend  { font: 500 11px -apple-system, "Segoe UI", Roboto, sans-serif; fill: #94A3B8; }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="380" rx="16" fill="url(#bgGrad)"/>
  <rect x="0" y="0" width="1200" height="380" rx="16" fill="url(#glow)"/>

  <!-- Accent top line -->
  <rect x="24" y="0" width="200" height="3" fill="url(#accent)" opacity="0.9"/>

  <!-- LEFT — text block -->
  <g transform="translate(64,70)">
    <text class="eyebrow">Claude Code plugin · v0.3.4</text>
    <text y="72" class="title">Skill Advisor</text>
    <text y="120" class="tag">One task. The right skills. Never mixed.</text>

    <!-- Feature chips -->
    <g transform="translate(0,162)">
      <rect x="0" y="0" width="180" height="34" rx="17" fill="#1E293B" stroke="#7C3AED" stroke-width="1"/>
      <circle cx="16" cy="17" r="4" fill="#A78BFA"/>
      <text x="30" y="22" class="chip">Per-step picker</text>

      <rect x="196" y="0" width="220" height="34" rx="17" fill="#1E293B" stroke="#7C3AED" stroke-width="1"/>
      <circle cx="212" cy="17" r="4" fill="#F472B6"/>
      <text x="226" y="22" class="chip">Pipeline-owner isolation</text>

      <rect x="432" y="0" width="170" height="34" rx="17" fill="#1E293B" stroke="#7C3AED" stroke-width="1"/>
      <circle cx="448" cy="17" r="4" fill="#34D399"/>
      <text x="462" y="22" class="chip">Obsidian-aware</text>
    </g>

    <!-- Small stats row -->
    <g transform="translate(0,226)">
      <text class="legend">86 skills indexed  ·  500 tests passing  ·  sub-50ms hook  ·  local-first, zero network</text>
    </g>
  </g>

  <!-- RIGHT — graph visualization -->
  <g transform="translate(760,40)">
    <!-- Glow blob behind -->
    <circle cx="180" cy="150" r="120" fill="#8B5CF6" opacity="0.12" filter="url(#soft)"/>

    <!-- Edges (drawn first so they go behind nodes) -->
    <g stroke="url(#accent)" stroke-width="1.2" opacity="0.55" fill="none">
      <path d="M 180 150 L 90 70"/>
      <path d="M 180 150 L 280 60"/>
      <path d="M 180 150 L 310 180"/>
      <path d="M 180 150 L 120 240"/>
      <path d="M 180 150 L 240 260"/>
      <path d="M 180 150 L 60 160"/>
      <path d="M 90 70 L 40 120"/>
      <path d="M 280 60 L 340 110"/>
      <path d="M 310 180 L 340 110"/>
      <path d="M 240 260 L 310 180"/>
      <path d="M 120 240 L 60 160"/>
      <path d="M 120 240 L 240 260"/>
      <path d="M 90 70 L 280 60"/>
      <path d="M 40 120 L 60 160"/>
    </g>

    <!-- Nodes -->
    <!-- Central = advisor core -->
    <circle cx="180" cy="150" r="22" fill="url(#purple)" stroke="#F8FAFC" stroke-width="2"/>
    <text x="180" y="154" text-anchor="middle" class="chip" fill="#F8FAFC">A</text>

    <!-- Obsidian-style gem (diamond shape) -->
    <g transform="translate(268,42)">
      <path d="M 12 0 L 24 16 L 12 36 L 0 16 Z" fill="#8B5CF6" stroke="#F8FAFC" stroke-width="1.5"/>
      <path d="M 12 0 L 24 16 L 12 22 Z" fill="#C4B5FD"/>
      <path d="M 0 16 L 12 22 L 12 36 Z" fill="#6D28D9" opacity="0.85"/>
    </g>

    <!-- Other nodes (different colors = different plugin families) -->
    <circle cx="90" cy="70" r="10" fill="#F472B6" stroke="#F8FAFC" stroke-width="1"/>
    <circle cx="310" cy="180" r="9" fill="#34D399" stroke="#F8FAFC" stroke-width="1"/>
    <circle cx="120" cy="240" r="9" fill="#FBBF24" stroke="#F8FAFC" stroke-width="1"/>
    <circle cx="240" cy="260" r="8" fill="#60A5FA" stroke="#F8FAFC" stroke-width="1"/>
    <circle cx="60" cy="160" r="7" fill="#A78BFA" stroke="#F8FAFC" stroke-width="0.8"/>
    <circle cx="340" cy="110" r="7" fill="#F87171" stroke="#F8FAFC" stroke-width="0.8"/>
    <circle cx="40" cy="120" r="5" fill="#E2E8F0" stroke="#94A3B8" stroke-width="0.6"/>

    <!-- Tiny label by Obsidian gem -->
    <text x="308" y="54" class="legend" fill="#C4B5FD">Obsidian</text>
  </g>

  <!-- Bottom tagline -->
  <text x="64" y="348" class="legend">github.com/fernandoxavier02/skill-advisor  ·  MIT  ·  Made for builders who want the right tool, not the default</text>
</svg>
