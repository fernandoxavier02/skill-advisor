<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" role="img" aria-labelledby="mxTitle mxDesc" preserveAspectRatio="xMidYMid meet">
  <title id="mxTitle">Pipeline-owner isolation matrix</title>
  <desc id="mxDesc">Five orchestrated plugins plus the standalone pool. Pipeline-owned skills from different plugins can never be mixed in a single loadout; each owner collapses to its canonical flow when selected.</desc>

  <defs>
    <linearGradient id="bgM" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E1B4B"/>
    </linearGradient>
    <style>
      .h1 { font: 700 16px -apple-system, "Segoe UI", Roboto, sans-serif; fill: #F8FAFC; }
      .h2 { font: 500 12px -apple-system, "Segoe UI", Roboto, sans-serif; fill: #E2E8F0; }
      .hdr { font: 700 10.5px -apple-system, "Segoe UI", Roboto, sans-serif; fill: #A78BFA; letter-spacing: 0.14em; text-transform: uppercase; }
      .cell { font: 400 11px -apple-system, "Segoe UI", Roboto, sans-serif; fill: #CBD5E1; }
      .ok { fill: #34D399; font-weight: 700; }
      .no { fill: #F87171; font-weight: 700; }
    </style>
  </defs>

  <rect x="0" y="0" width="960" height="360" rx="12" fill="url(#bgM)"/>

  <text x="32" y="40" class="h1">Pipeline-owner isolation</text>
  <text x="32" y="58" class="h2" fill="#94A3B8">A loadout is either all-standalone OR all-same-owner. Cross-owner mixes are rejected before the dry-run.</text>

  <!-- Table header row -->
  <g transform="translate(32,92)">
    <rect x="0" y="0" width="896" height="34" rx="6" fill="#1E293B"/>
    <text x="16" y="22" class="hdr">Owner</text>
    <text x="250" y="22" class="hdr">Mixable?</text>
    <text x="390" y="22" class="hdr">Canonical flow when selected</text>
  </g>

  <!-- Row: Standalone pool -->
  <g transform="translate(32,134)">
    <rect x="0" y="0" width="896" height="30" fill="#0B1220"/>
    <circle cx="16" cy="15" r="5" fill="#34D399"/>
    <text x="32" y="20" class="h2">Standalone skills (most of the catalog)</text>
    <text x="250" y="20" class="cell ok">YES — compose freely, any mix</text>
    <text x="390" y="20" class="cell">sized by complexity (1-2 / 3 / 4-5)</text>
  </g>

  <!-- Row: Superpowers -->
  <g transform="translate(32,170)">
    <rect x="0" y="0" width="896" height="30" fill="#111827"/>
    <circle cx="16" cy="15" r="5" fill="#8B5CF6"/>
    <text x="32" y="20" class="h2">superpowers</text>
    <text x="250" y="20" class="cell no">NO — same owner only</text>
    <text x="390" y="20" class="cell">brainstorming → writing-plans → executing-plans → verification</text>
  </g>

  <!-- Row: Kiro -->
  <g transform="translate(32,206)">
    <rect x="0" y="0" width="896" height="30" fill="#0B1220"/>
    <circle cx="16" cy="15" r="5" fill="#F472B6"/>
    <text x="32" y="20" class="h2">kiro</text>
    <text x="250" y="20" class="cell no">NO — same owner only</text>
    <text x="390" y="20" class="cell">kiro-discovery → spec-quick → impl → validate-impl</text>
  </g>

  <!-- Row: SDD -->
  <g transform="translate(32,242)">
    <rect x="0" y="0" width="896" height="30" fill="#111827"/>
    <circle cx="16" cy="15" r="5" fill="#FBBF24"/>
    <text x="32" y="20" class="h2">sdd</text>
    <text x="250" y="20" class="cell no">NO — same owner only</text>
    <text x="390" y="20" class="cell">sdd:brainstorm → plan → implement</text>
  </g>

  <!-- Row: Compound Engineering -->
  <g transform="translate(32,278)">
    <rect x="0" y="0" width="896" height="30" fill="#0B1220"/>
    <circle cx="16" cy="15" r="5" fill="#60A5FA"/>
    <text x="32" y="20" class="h2">compound-engineering</text>
    <text x="250" y="20" class="cell no">NO — same owner only</text>
    <text x="390" y="20" class="cell">ce-brainstorm → ce-plan → ce-work → ce-commit</text>
  </g>

  <!-- Row: Pipeline Orchestrator -->
  <g transform="translate(32,314)">
    <rect x="0" y="0" width="896" height="30" fill="#111827"/>
    <circle cx="16" cy="15" r="5" fill="#F87171"/>
    <text x="32" y="20" class="h2">pipeline-orchestrator</text>
    <text x="250" y="20" class="cell no">NO — atomic</text>
    <text x="390" y="20" class="cell">/pipeline-orchestrator:pipeline (handles everything internally)</text>
  </g>
</svg>
