name: Close stale issues
on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v9
        with:
          days-before-issue-stale: 45
          days-before-issue-close: 14
          days-before-pr-stale: 45
          days-before-pr-close: 14
          stale-issue-message: |
            This issue has been inactive for 45 days. It will close in 14 days if no further activity occurs.
          stale-pr-message: |
            This PR has been inactive for 45 days. It will close in 14 days if no further activity occurs.
          close-issue-message: 'Closing due to inactivity. Reopen if still relevant.'
          close-pr-message: 'Closing due to inactivity. Reopen if still relevant.'
          exempt-issue-labels: 'pinned,security'
          exempt-pr-labels: 'pinned,security'
